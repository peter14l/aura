# .github/workflows/aura-build.yml
name: Aura — Build, Verify & Ship

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (stable/nightly)'
        required: false
        default: 'nightly'

env:
  RUST_VERSION: "stable"
  CARGO_TERM_COLOR: always

jobs:
  # ── Job 1: Vibe Check (Parallel) ─────────────────────────────────────────
  vibe-check:
    name: 🌿 Vibe Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            clang \
            libclang-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libdbus-1-dev \
            libssl-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libatk1.0-dev \
            libpango1.0-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test --workspace

  # ── Job 2: Unified Build & Bundle ───────────────────────────────────────
  build:
    name: 📦 Build — ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: aura_engine.dll
          - platform: linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: libaura_engine.so
          - platform: macos
            os: macos-14
            target: aarch64-apple-darwin
            artifact: libaura_engine.dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            clang \
            libclang-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libdbus-1-dev \
            libssl-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libatk1.0-dev \
            libpango1.0-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.platform }}-${{ hashFiles('**/Cargo.toml') }}

      - name: Build Engine
        run: cargo build --release -p aura-engine --target ${{ matrix.target }}

      - name: Prepare Resources
        shell: bash
        run: |
          mkdir -p aura-app/resources
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} aura-app/resources/

      - name: Build App Bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: aura-app
          tagName: aura-v__VERSION__
          releaseName: "Aura v__VERSION__"
          releaseBody: "Automated release of Aura Browser"
          releaseDraft: true
          prerelease: false

      - name: Upload Engine Artifact (Manual)
        uses: actions/upload-artifact@v4
        with:
          name: aura-engine-${{ matrix.platform }}
          path: aura-app/resources/${{ matrix.artifact }}
